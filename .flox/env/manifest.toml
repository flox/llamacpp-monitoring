version = 1

[install]
prometheus.pkg-path = "prometheus"
grafana.pkg-path = "grafana"
curl.pkg-path = "curl"
jq.pkg-path = "jq"
llamacpp-monitoring.pkg-path = "flox/llamacpp-flox-monitoring"
llamacpp-monitoring.systems = ["x86_64-linux", "x86_64-darwin", "aarch64-darwin"]

[hook]
on-activate = '''
  . llamacpp-monitoring-init
'''

[services]
prometheus.command = "llamacpp-monitoring-prometheus"
grafana.command = "llamacpp-monitoring-grafana"

[options]
